<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SOMMAIRE | JUDOGI STORE SYSTEM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@900&family=Syncopate:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Ajustements spécifiques pour le Sommaire */
        .hub-header {
            padding: 100px 20px 60px;
            text-align: center;
        }

        .hub-header h1 {
            font-family: 'Syncopate';
            font-size: clamp(2em, 8vw, 4em);
            letter-spacing: 15px;
            text-transform: uppercase;
            color: white;
            margin-bottom: 10px;
        }

        /* Style spécifique pour le tableau demandé par l'exercice */
        .nav-table-container {
            max-width: 1400px;
            margin: 0 auto 100px;
            padding: 0 50px;
        }

        .styled-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 20px;
        }

        .nav-cell {
            width: 33.33%;
            height: 500px;
            position: relative;
            border: 1px solid var(--border);
            overflow: hidden;
            background: #000;
        }

        .nav-cell:hover {
            border-color: var(--red);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.2);
        }

        /* Effet image comme sur l'Index */
        .cell-img {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .cell-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.3);
            transition: 0.6s ease-out;
        }

        .nav-cell:hover .cell-img img {
            filter: grayscale(0) brightness(0.5);
            transform: scale(1.1);
        }

        .cell-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            z-index: 2;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            text-align: left;
        }

        .cell-content span {
            color: var(--red);
            font-family: 'Space Mono';
            font-size: 0.7em;
            letter-spacing: 3px;
        }

        .cell-content h2 {
            font-family: 'Syncopate';
            font-size: 1.5em;
            letter-spacing: 4px;
            color: white;
            margin-top: 5px;
            text-decoration: none;
        }

        .full-link {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        @media (max-width: 1000px) {
            .styled-table, .styled-table tr, .styled-table td { display: block; width: 100%; }
            .nav-cell { height: 300px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="scroll-progress"></div>
    
    <div class="top-credit">SYSTEM_ACCESS // SOMMAIRE_GENERAL</div>

    <header class="hub-header">
        <h1>SOMMAIRE</h1>
        <p style="font-family:'Space Mono'; color:var(--red); letter-spacing:5px; font-size:0.8em;">ACCÈS_AUX_DOSSIERS_PERSONNELS</p>
    </header>

    <div class="nav-table-container">
        <table class="styled-table">
            <tr>
                <td class="nav-cell">
                    <a href="presentation.html" class="full-link"></a>
                    <div class="cell-img">
                        <img src="https://images.unsplash.com/photo-1555597673-b21d5c935865?q=80&w=1000" alt="Présentation">
                    </div>
                    <div class="cell-content">
                        <span>DOSSIER_01</span>
                        <h2>PRÉSENTATION</h2>
                    </div>
                </td>

                <td class="nav-cell">
                    <a href="formations.html" class="full-link"></a>
                    <div class="cell-img">
                        <img src="https://images.unsplash.com/photo-1552072092-7f9b8d63efcb?q=80&w=1000" alt="Formations">
                    </div>
                    <div class="cell-content">
                        <span>DOSSIER_02</span>
                        <h2>FORMATIONS</h2>
                    </div>
                </td>

                <td class="nav-cell">
                    <a href="liens.html" class="full-link"></a>
                    <div class="cell-img">
                        <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1000" alt="Liens">
                    </div>
                    <div class="cell-content">
                        <span>DOSSIER_03</span>
                        <h2>LIENS_UTILES</h2>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div style="text-align: center; margin-bottom: 80px;">
        <a href="index.html" class="btn-action btn-join" style="display:inline-block; padding: 20px 40px; text-decoration:none;">
            RETOUR AU STORE
        </a>
    </div>

    <footer>
        <span class="footer-name">ROMAIN BOIS</span>
        <span class="footer-sub">TD1 — PARIS NANTERRE</span>
    </footer>

    <script>
        window.onscroll = function() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        };
    </script>

</body>
</html>
