<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>REJOINDRE L'ÉLITE | JUDOGI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&family=Syncopate:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --red: #ff003c;
            --white: #f1faee;
            --dark: #050505;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--dark);
            font-family: 'Kanit', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            padding: 80px 20px;
        }

        /* --- SIGNATURE HAUT DE PAGE --- */
        .top-credit {
            position: fixed;
            top: 25px;
            font-family: 'Space Mono';
            font-size: 0.75em;
            letter-spacing: 6px;
            color: var(--red);
            z-index: 100;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- TITRE AVEC EFFET GLITCH (Identique Accueil) --- */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.5em, 5vw, 3em);
            letter-spacing: 10px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        h1:hover {
            animation: glitch-clean 0.2s infinite;
            text-shadow: 3px 0 var(--red), -3px 0 #00fff9;
        }

        @keyframes glitch-clean {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }

        .subtitle {
            font-family: 'Space Mono';
            font-size: 0.7em;
            color: rgba(255,255,255,0.4);
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-align: center;
        }

        /* --- CONTENEUR FORMULAIRE --- */
        .cyber-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 50px;
            position: relative;
        }

        .section-header {
            font-family: 'Syncopate';
            font-size: 0.9em;
            color: var(--red);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 3px;
        }

        /* --- INPUTS STYLISÉS --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-box { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 0.7em;
            font-family: 'Space Mono';
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: white;
            font-family: 'Kanit';
            font-size: 1em;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--red);
            background: rgba(255, 0, 60, 0.05);
        }

        /* --- BOUTONS --- */
        .btn-panel { display: flex; gap: 20px; margin-top: 50px; }

        .btn-submit {
            flex: 2;
            padding: 20px;
            background: var(--red);
            color: white;
            border: none;
            font-family: 'Syncopate';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }

        .btn-submit:hover {
            box-shadow: 0 0 30px var(--red);
            transform: translateY(-2px);
        }

        .btn-cancel {
            flex: 1;
            padding: 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            font-family: 'Syncopate';
            font-size: 0.8em;
            cursor: pointer;
        }

        .btn-cancel:hover { background: rgba(255,255,255,0.1); }

        /* --- FOOTER (SIGNATURE) --- */
        footer {
            margin-top: 100px;
            text-align: center;
            width: 100%;
            padding: 60px;
            border-top: 2px solid var(--red);
            background: #000;
        }

        .footer-name { font-family: 'Syncopate'; font-size: 1.8em; letter-spacing: 8px; display: block; }
        .footer-sub { font-family: 'Space Mono'; font-size: 0.9em; color: var(--red); letter-spacing: 5px; }

        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="top-credit">BY ROMAIN BOIS TD1 — PARIS NANTERRE</div>

    <h1>ELITE ENROLMENT</h1>
    <div class="subtitle">SYSTÈME D'ENRÔLEMENT JUDOGI STORE v2.0</div>

    <div class="cyber-container">
        <form action="#">
            <div class="section-header">#01 IDENTITÉ</div>
            <div class="grid">
                <div class="input-box">
                    <label>Nom de famille</label>
                    <input type="text" placeholder="EX: KANO" required>
                </div>
                <div class="input-box">
                    <label>Prénom</label>
                    <input type="text" placeholder="EX: JIGORO" required>
                </div>
            </div>

            <div class="grid">
                <div class="input-box">
                    <label>Date de Naissance</label>
                    <input type="date">
                </div>
                <div class="input-box">
                    <label>Grade / Ceinture</label>
                    <select required>
                        <option disabled selected>SÉLECTIONNER GRADE</option>
                        <option>BLANCHE</option>
                        <option>JAUNE / ORANGE</option>
                        <option>VERTE / BLEUE</option>
                        <option>MARRON</option>
                        <option>NOIRE (DAN 1+)</option>
                    </select>
                </div>
            </div>

            <div class="section-header">#02 ANALYSE TECHNIQUE</div>
            <div class="grid">
                <div class="input-box">
                    <label>Nom du Club / Dojo</label>
                    <input type="text" placeholder="NOM DU DOJO">
                </div>
                <div class="input-box">
                    <label>Numéro de Licence</label>
                    <input type="text" placeholder="FR-XXXXXXXX">
                </div>
            </div>

            <div class="input-box">
                <label>Instructions Spécifiques (Taille, Broderie...)</label>
                <textarea rows="3" placeholder="VOS NOTES ICI..."></textarea>
            </div>

            <div class="btn-panel">
                <button type="submit" class="btn-submit">INITIALISER L'ADHÉSION</button>
                <button type="reset" class="btn-cancel">RESET</button>
            </div>
        </form>

        <a href="index.html" style="display:block; text-align:center; margin-top:40px; color:rgba(255,255,255,0.2); text-decoration:none; font-size:0.7em; font-family:'Space Mono'; letter-spacing:3px;">
            [ RETOUR VERS L'ACCUEIL ]
        </a>
    </div>

    <footer>
        <span class="footer-name">ROMAIN BOIS</span>
        <span class="footer-sub">TD1 — PARIS NANTERRE</span>
    </footer>

</body>
</html>
